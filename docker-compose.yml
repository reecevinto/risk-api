services:
  api:
    build: .
    container_name: risk-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: risk-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: riskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: