<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Risk Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<div class="max-w-4xl mx-auto">

  <h1 class="text-3xl font-bold mb-6">🚀 Risk API Dashboard</h1>

  <!-- STATUS -->
  <div id="status" class="mb-4 text-sm text-gray-600">Loading dashboard...</div>

  <!-- API KEY -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="text-xl font-semibold mb-2">API Key</h2>
    <p id="apiKey" class="text-green-600 font-mono break-all">...</p>
  </div>

  <!-- 🧠 BILLING STATE (NEW DAY 1 PHASE 2 ADDITION) -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="text-xl font-semibold mb-2">Billing Status</h2>

    <p>Plan: <span id="plan" class="font-semibold text-blue-600">FREE</span></p>
    <p>Subscription: <span id="subStatus" class="font-semibold text-green-600">UNKNOWN</span></p>
    <p>Stripe Customer: <span id="stripeStatus" class="font-semibold text-gray-600">NOT LINKED</span></p>

    <p id="billingStatus" class="text-sm text-gray-500 mt-2"></p>
  </div>

  <!-- BILLING ACTIONS -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="text-xl font-semibold mb-2">Upgrade</h2>

    <div class="flex gap-4">
      <button onclick="upgradeToPro()"
        class="bg-black text-white px-4 py-2 rounded hover:bg-gray-800">
        💳 Upgrade to Pro
      </button>

      <button onclick="upgradeToEnterprise()"
        class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
        🏢 Upgrade to Enterprise
      </button>
    </div>
  </div>

  <!-- USAGE STATS -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="text-xl font-semibold mb-2">Usage</h2>
    <p>Total Requests: <span id="total">0</span></p>
    <p>Average Risk Score: <span id="avg">0</span></p>
  </div>

  <!-- RECENT REQUESTS -->
  <div class="bg-white p-4 rounded shadow">
    <h2 class="text-xl font-semibold mb-2">Recent Requests</h2>
    <ul id="recent" class="space-y-2"></ul>
  </div>

</div>

<script>

const API_KEY ="639479ab632caf8889314ec41841c653f662d17ac9e95324f99119100875e864";

async function loadDashboard() {
  const statusEl = document.getElementById("status");

  try {

    // ==============================
    // USER INFO (UPDATED FOR PHASE 2)
    // ==============================
    const userRes = await fetch("http://localhost:8000/user/me", {
      headers: { "x-api-key": API_KEY }
    });

    const user = await userRes.json();

    document.getElementById("apiKey").innerText =
      user.api_key || "No API key returned";

    // 🧠 NEW: PLAN INFO (DAY 1 PHASE 2)
    document.getElementById("plan").innerText =
      user.plan || "FREE";

    document.getElementById("subStatus").innerText =
      user.subscription_status || "NO SUBSCRIPTION";

    document.getElementById("stripeStatus").innerText =
      user.stripe_customer_id ? "LINKED" : "NOT LINKED";


    // ==============================
    // USAGE
    // ==============================
    const usageRes = await fetch("http://localhost:8000/admin/usage", {
      headers: { "x-api-key": API_KEY }
    });

    const usage = await usageRes.json();

    document.getElementById("total").innerText =
      usage.total_requests ?? 0;

    document.getElementById("avg").innerText =
      usage.average_risk_score?.toFixed(2) ?? "0.00";


    // ==============================
    // RECENT REQUESTS
    // ==============================
    const list = document.getElementById("recent");
    list.innerHTML = "";

    if (!usage.recent_requests?.length) {
      list.innerHTML = "<li class='text-gray-500'>No requests yet</li>";
    } else {
      usage.recent_requests.forEach(r => {
        const item = document.createElement("li");
        item.className = "border p-2 rounded bg-gray-50";
        item.innerText = `${r.email || "N/A"} | ${r.ip || "N/A"} | Score: ${r.risk_score}`;
        list.appendChild(item);
      });
    }

    statusEl.innerText = "✅ Dashboard loaded successfully";

  } catch (error) {
    console.error(error);
    statusEl.innerText = "❌ Error loading dashboard";
  }
}

loadDashboard();


// ==============================
// BILLING ACTIONS
// ==============================
async function upgradeToPro() {
  const statusEl = document.getElementById("billingStatus");
  statusEl.innerText = "Creating Pro checkout...";

  const res = await fetch("http://localhost:8000/billing/checkout/pro", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    }
  });

  const data = await res.json();
  window.location.href = data.checkout_url;
}

async function upgradeToEnterprise() {
  const statusEl = document.getElementById("billingStatus");
  statusEl.innerText = "Creating Enterprise checkout...";

  const res = await fetch("http://localhost:8000/billing/checkout/enterprise", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    }
  });

  const data = await res.json();
  window.location.href = data.checkout_url;
}

</script>

</body>
</html>
